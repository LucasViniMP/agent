name: mesamestre
description: MesaMestre - Sistema de Gestão Profissional de Restaurantes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1

  # State Management
  provider: ^6.1.2

  # HTTP & API
  http: ^1.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Socket.IO
  socket_io_client: ^3.1.4

  # Local Storage
  shared_preferences: ^2.2.3

  # Animations
  flutter_animate: ^4.5.0

  # UI
  google_fonts: ^8.1.0
  intl: ^0.20.2
  cloud_firestore: ^6.4.1
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
